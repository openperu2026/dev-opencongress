services:
  initial-migration:
    image: ${RAW_MIGRATION_IMAGE}
    build:
      context: .
      dockerfile: backend/database/migration/migration.Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL}
      SQLITE_PATH: ${SQLITE_PATH}
    volumes:
      - migration_logs:/app/logs
    profiles:
      - migration

volumes:
  migration_logs:
