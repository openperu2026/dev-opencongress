{% extends "base.html" %}

{% block content %}
<div class="searching-container">
    <h1 class="search-title">Search the congressmen</h1>

    <form method="get" action="{{ url_for('congress.index') }}">
        <input type="text" name="q" value="{{ q or '' }}" placeholder="Write a congressperson name">
        <button type="submit">Search</button>
    </form>
    {% if congresistas %}
        <ul>
            {% for congresista in congresistas %}
                <li>
                    <a href="{{ url_for('congress.congress_detail', congresista_id=congresista.id) }}">
                        {{ congresista.id }} - {{ congresista.full_name }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% elif q %}
        <p>No matching congresspeople found.</p>
    {% endif %}

{% endblock %}
