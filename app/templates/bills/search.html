{% extends "base.html" %}

{% block content %}
<div class="searching-container">
    <h1 class="search-title">Search the Bill</h1>

    <form method="get" action="{{ url_for('bills.index') }}">
        <input type="text" name="q" value="{{ q or '' }}" placeholder="Write a bill you are looking for">
        <button type="submit">Search</button>
    </form>
    {% if bills %}
        <ul>
            {% for bill in bills %}
                <li>
                    <a href="{{ url_for('bills.bill_detail', bill_id=bill.id) }}">
                        {{ bill.id }} - {{ bill.title }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% elif q %}
        <p>No matching bills found.</p>
    {% endif %}

{% endblock %}
