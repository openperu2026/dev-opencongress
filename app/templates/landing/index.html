{% extends "base.html" %}

{% block content %}


<div class="page-container">
    <div class="content-container">
        <img class="landing-logo" src="{{ url_for('static', filename='images/Imagotipo.svg') }}" alt="Open Congress logo">
        <p class="page-subtitle">
            Select what information about the peruvian congress you want to explore

        </p>
        
        <div class="menu-landing">
            {% for item in menu_items %}
                <div class="menu-card">
                    <a href="{{ item.url }}">
                        {{ item.name }}
                    </a>
                </div>
            {% endfor %}
        </div>
    </div>
</div>

{% endblock %}
