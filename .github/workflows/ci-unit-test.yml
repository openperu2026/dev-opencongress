name: CI Unit Tests

on:
  pull_request:
    paths-ignore:
      - "**/*.md"  

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.19"
          enable-cache: true

      - name: Install pytesseract
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-spa

      - name: Install project
        run: uv sync --locked --all-extras --dev

      - name: Run tests
        run: uv run pytest

  pr-coverage:
    name: Coverage (pull_request)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.7.19"
          enable-cache: true

      - name: Install pytesseract
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-spa

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Run tests with coverage
        run: |
          uv run coverage run \
          --source=backend/scrapers,backend/database,backend/process \
          -m pytest
          uv run coverage report --fail-under=50
          uv run coverage xml
          uv run coverage lcov

      - name: Comment PR with coverage
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage.lcov        